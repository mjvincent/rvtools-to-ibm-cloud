name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
      - "fix/**"
      - "refactor/**"
      - "ui/**"

permissions:
  contents: read
  packages: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONFAULTHANDLER: "1"

jobs:
  test:
    name: Python and Terraform validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Python audit tooling
        run: python -m pip install pip-audit

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Run pytest
        run: |
          set -o pipefail
          python -m pytest -W error::DeprecationWarning -ra --tb=short 2>&1 | tee pytest.log

      - name: Upload pytest log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest.log
          if-no-files-found: ignore

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate generated Terraform package
        run: python scripts/validate_terraform_package.py --init-validate

  carbon-ui:
    name: Carbon UI validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: prototype/carbon-ui

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: prototype/carbon-ui/package-lock.json

      - name: Install Carbon dependencies
        run: npm ci

      - name: Audit Carbon dependencies
        run: |
          mkdir -p ci-artifacts
          set -o pipefail
          npm audit --audit-level=high 2>&1 | tee ci-artifacts/npm-audit.log

      - name: Type-check Carbon UI
        run: |
          mkdir -p ci-artifacts
          set -o pipefail
          npx tsc --noEmit --incremental false 2>&1 | tee ci-artifacts/typescript.log

      - name: Test Carbon UI
        run: |
          mkdir -p ci-artifacts
          set -o pipefail
          npm test -- --runInBand 2>&1 | tee ci-artifacts/jest.log

      - name: Build Carbon UI
        run: |
          mkdir -p ci-artifacts
          set -o pipefail
          npm run build 2>&1 | tee ci-artifacts/next-build.log

      - name: Upload Carbon failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: carbon-ui-failure-artifacts
          path: |
            prototype/carbon-ui/ci-artifacts/*.log
            prototype/carbon-ui/.next/trace
          if-no-files-found: ignore

  container-smoke:
    name: Container smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rvtools-to-ibm-cloud:ci .

      - name: Run Streamlit container
        run: |
          docker run \
            --detach \
            --name rvtools-streamlit-smoke \
            --publish 8503:8501 \
            rvtools-to-ibm-cloud:ci

      - name: Check Streamlit health endpoint
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error \
              http://localhost:8503/_stcore/health; then
              exit 0
            fi
            echo "Waiting for Streamlit health endpoint (${attempt}/30)..."
            sleep 2
          done
          docker logs rvtools-streamlit-smoke
          exit 1

      - name: Capture Streamlit container logs
        if: failure()
        run: |
          mkdir -p ci-artifacts
          docker logs rvtools-streamlit-smoke > ci-artifacts/container-smoke.log 2>&1 || true
          docker ps --all > ci-artifacts/container-ps.log 2>&1 || true

      - name: Upload Streamlit container failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: streamlit-container-smoke-artifacts
          path: ci-artifacts/*.log
          if-no-files-found: ignore

      - name: Stop Streamlit container
        if: always()
        run: docker rm --force rvtools-streamlit-smoke

  compose-smoke:
    name: Docker Compose persistence smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rvtools-to-ibm-cloud:ci .

      - name: Start Compose stack
        env:
          APP_IMAGE: rvtools-to-ibm-cloud:ci
          STREAMLIT_PORT: "8504"
          API_PORT: "8001"
        run: docker compose up --detach

      - name: Check Streamlit health endpoint
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error \
              http://localhost:8504/_stcore/health; then
              exit 0
            fi
            echo "Waiting for Streamlit health endpoint (${attempt}/30)..."
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Check prototype API health endpoint
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error \
              http://localhost:8001/health; then
              exit 0
            fi
            echo "Waiting for prototype API health endpoint (${attempt}/30)..."
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Capture Compose stack logs
        if: failure()
        run: |
          mkdir -p ci-artifacts
          docker compose logs > ci-artifacts/compose-smoke.log 2>&1 || true
          docker compose ps > ci-artifacts/compose-ps.log 2>&1 || true

      - name: Upload Compose failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-smoke-artifacts
          path: ci-artifacts/*.log
          if-no-files-found: ignore

      - name: Stop Compose stack
        if: always()
        run: docker compose down --volumes

  ghcr-image:
    name: GHCR image build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mjvincent/rvtools-to-ibm-cloud
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and optionally publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
